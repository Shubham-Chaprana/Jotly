{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Notes App{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<nav class = "navbar" >
    <div class = "nav-container">
        <a class = "logo-link" href="{% url 'notes:list' %}">Jotly</a>
        <a class = "new-note-btn" href="{% url 'notes:add' %}"> <i class="fa-solid fa-plus"></i> Add Note</a>
    </div>
</nav>


<main>
    <div>
        {% block content %}
        {% endblock %}
    </div>
</main>

</body>
</html>
